<!DOCTYPE html>
<html>
<head>
    <title>Amazon Affiliate Dashboard - Recommendations</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h2>Product Recommendations</h2>
    
    <div class="product-container">
        {% for product in products %}
        <div class="product-tile">
            <img src="{{ product['Primary_Image'] }}" alt="{{ product['Title'] }}">
            <h3>{{ product['Product_Name'] }}</h3>
            <p>Price: {{ product['Current_Price'] }}₹</p>
            <p class="strikethrough-text">Original Price: {{ product['Original_Price'] }}₹</p>
            <a href="{{ product['Product_Link'] }}" target="_blank">View Product</a>
        </div>
        {% endfor %}
    </div>
</body>
</html>
